<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tâches</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- AUTH -->
  <div id="auth">
    <div class="logo">tâches</div>

    <div id="screen-login">
      <h1>Connexion</h1>
      <p class="sub">Bon retour.</p>
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="vous@exemple.com" /></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="l-pw" placeholder="••••••••" /></div>
      <button class="btn" onclick="login()">Se connecter</button>
      <p class="switch">Pas de compte ? <a onclick="showScreen('screen-register')">Créer un compte</a></p>
    </div>

    <div id="screen-register" style="display:none">
      <h1>Créer un compte</h1>
      <p class="sub">C'est rapide.</p>
      <div class="field"><label>Prénom</label><input type="text" id="r-name" placeholder="Marie" /></div>
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="vous@exemple.com" /></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="r-pw" placeholder="••••••••" /></div>
      <button class="btn" onclick="register()">Créer mon compte</button>
      <p class="switch">Déjà un compte ? <a onclick="showScreen('screen-login')">Se connecter</a></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="app-header">
      <div class="logo">tâches</div>
      <button class="logout-btn" id="user-label" onclick="logout()">déconnexion</button>
    </div>
    <div class="add-row">
      <input type="text" id="inp-text" placeholder="Nouvelle tâche…" onkeydown="if(event.key==='Enter')addTodo()" />
      <input type="date" id="inp-date" />
      <input type="time" id="inp-time" />
      <button class="btn-add" onclick="addTodo()">+ Ajouter</button>
    </div>
    <div id="list"></div>
  </div>

  <script>
    var todos = [];
    var currentUser = '';

    function showScreen(id) {
      document.getElementById('screen-login').style.display    = (id === 'screen-login')    ? '' : 'none';
      document.getElementById('screen-register').style.display = (id === 'screen-register') ? '' : 'none';
    }

    function goApp(name) {
      currentUser = name;
      document.getElementById('user-label').textContent = name + ' — déconnexion';
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display  = 'block';
      var now = new Date();
      document.getElementById('inp-date').value = now.toISOString().slice(0, 10);
      document.getElementById('inp-time').value = now.toTimeString().slice(0, 5);
      render();
    }

    function login() {
      var email = document.getElementById('l-email').value.trim();
      if (!email) return;
      goApp(email.split('@')[0]);
    }

    function register() {
      var name = document.getElementById('r-name').value.trim();
      if (!name) return;
      goApp(name);
    }

    function logout() {
      todos = [];
      document.getElementById('app').style.display  = 'none';
      document.getElementById('auth').style.display = '';
      showScreen('screen-login');
    }

    function addTodo() {
      var text = document.getElementById('inp-text').value.trim();
      if (!text) return;
      todos.unshift({
        id:   Date.now(),
        text: text,
        date: document.getElementById('inp-date').value,
        time: document.getElementById('inp-time').value,
        done: false
      });
      document.getElementById('inp-text').value = '';
      render();
    }

    function toggle(id) {
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === id) { todos[i].done = !todos[i].done; break; }
      }
      render();
    }

    function remove(id) {
      todos = todos.filter(function(t){ return t.id !== id; });
      render();
    }

    function fmt(date, time) {
      var parts = [];
      if (date) parts.push(new Date(date + 'T12:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }));
      if (time) parts.push(time);
      return parts.join(' · ');
    }

    function render() {
      var el = document.getElementById('list');
      if (!todos.length) {
        el.innerHTML = '<p class="empty">Aucune tâche.</p>';
        return;
      }
      var html = '';
      for (var i = 0; i < todos.length; i++) {
        var t = todos[i];
        html += '<div class="todo-item ' + (t.done ? 'done' : '') + '">'
          + '<div class="check" onclick="toggle(' + t.id + ')">' + (t.done ? '✓' : '') + '</div>'
          + '<div class="todo-body">'
          + '<div class="todo-text">' + t.text + '</div>'
          + '<div class="todo-when">' + fmt(t.date, t.time) + '</div>'
          + '</div>'
          + '<button class="del" onclick="remove(' + t.id + ')">×</button>'
          + '</div>';
      }
      el.innerHTML = html;
    }
  </script>
</body>
</html>
