<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="home-page">
    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        if (!getCookie('user_id')) {
            window.location.href = '/login';
        }
    </script>

    <div id="meteo" class="meteo-bar">Chargement météo...</div>

    <nav class="navbar">
        <button class="btn-logout" onclick="logout()">Se déconnecter</button>
    </nav>

    <main class="home-main">
        <div class="container">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title">📝 Ma Todo List</h4>

                    <div class="add-items">
                        <input type="text" id="todoInput" placeholder="Ajouter une tâche..." />
                        <button class="btn" onclick="createTodo()">Ajouter</button>
                    </div>

                    <div class="list-wrapper">
                        <ul id="todoList"></ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadTodos() {
            const res = await fetch('/todos');
            const todos = await res.json();
            const list = document.getElementById('todoList');
            list.innerHTML = '';

            if (!todos || todos.length === 0) {
                list.innerHTML = '<li class="empty">Aucune tâche pour l\'instant</li>';
                return;
            }

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = todo.done ? 'done' : '';
                li.innerHTML = `
                    <span onclick="toggleTodo(${todo.id})">${todo.title}</span>
                    <button class="delete" onclick="deleteTodo(${todo.id})">🗑️</button>
                `;
                list.appendChild(li);
            });
        }

        async function createTodo() {
            const input = document.getElementById('todoInput');
            const title = input.value.trim();
            if (!title) return;

            await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });

            input.value = '';
            loadTodos();
        }

        async function toggleTodo(id) {
            await fetch(`/todos/${id}`, { method: 'PUT' });
            loadTodos();
        }

        async function deleteTodo(id) {
            await fetch(`/todos/${id}`, { method: 'DELETE' });
            loadTodos();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTodos();
            loadMeteo();
            document.getElementById('todoInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') createTodo();
            });
        });

        async function loadMeteo() {
            const res = await fetch('/meteo');
            if (!res.ok) {
                document.getElementById('meteo').innerText = '🌡️ Météo indisponible';
                return;
            }
            const data = await res.json();
            document.getElementById('meteo').innerText =
                `🌤️ ${data.ville} — ${data.temperature} — ${data.description}`;
        }

        async function logout() {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/login';
        }
    </script>
</body>
</html>
