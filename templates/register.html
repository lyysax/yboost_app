<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Todo List</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="card">
            <div class="card-body auth-card">
                <h1>Créer un compte</h1>
                <p class="auth-subtitle">Un compte simple pour organiser tes tâches au quotidien.</p>

                <div id="error" class="error-msg" style="display:none"></div>

                <div class="auth-form">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ton@email.com" />
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="********" />
                    <button onclick="register()">Créer mon compte</button>
                </div>

                <p class="switch-link">Déjà un compte ? <a href="/login">Se connecter</a></p>
            </div>
        </div>
    </div>

    <script>
        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                const msg = await res.text();
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = msg;
            }
        }
    </script>
</body>
</html>
